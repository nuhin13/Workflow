# harness.yaml — project topology & policy ("org code")
# Read by the thin orchestrator scripts in harness/orchestrator/.
version: 1
project: "YourProject"           # set by /kickoff — keep in sync with workspace/state.yaml
template_repo: null              # set by /harness-sync setup — where harness updates
                                 # are pulled from and universal lessons promoted to
profile: null                    # small|medium|large|extra-large|enterprise — set by /kickoff
                                 # (agent recommends, human picks; see profiles + ADR-0001)

# ── profiles: how much process this project runs (v2 · ADR-0001) ─────────────
# The agent RECOMMENDS one at kickoff from signals (team size, regulated domain,
# money handling, forecast scale, integrations) then STOPS; the human picks
# (rule 13). Escalation up (e.g. medium→large) is allowed mid-project and is
# recorded like an ADR; a downgrade must state what verification it drops.
profiles:
  small:                         # spike, demo, internal tool, < 1 week
    phases:    [business, design, srs, traceability, tech_plan, dev_plan, build]
    human_gates: [srs_approval, foundational_decisions, dev_plan_approval, release]
    review:    self-review only
    git:       { tiers: [main, task], require_pr: false }
    qa:        risky_tasks_only
  medium:                        # real product, solo / small team (TireBook)
    phases:    [business, design, srs, traceability, tech_plan, dev_plan, build]
    human_gates: [scope, srs_approval, foundational_decisions, dev_plan_approval, db_schema_migration, auth_or_payment_code, release]
    review:    peer_on_code_light_on_docs
    git:       { tiers: [main, epic, task], require_pr: false }
    qa:        epic_sweep_plus_high_risk
  large:                         # bigger product, more surface / integrations
    phases:    [business, design, srs, traceability, tech_plan, dev_plan, build]
    human_gates: [scope, srs_approval, foundational_decisions, dev_plan_approval, feature_epic_breakdown, db_schema_migration, auth_or_payment_code, new_dependency, release]
    review:    peer_on_all_code
    git:       { tiers: [main, epic, task], require_pr: false }
    qa:        epic_sweep_plus_high_risk
  extra-large:                   # near-enterprise, staged releases
    phases:    [business, design, srs, traceability, tech_plan, dev_plan, build]
    human_gates: [scope, srs_approval, foundational_decisions, dev_plan_approval, feature_epic_breakdown, epic_to_dev_merge, dev_to_main_merge, db_schema_migration, auth_or_payment_code, new_dependency, secrets_or_env_change, release]
    review:    peer_plus_qa_on_code
    git:       { tiers: [main, development, epic, task], require_pr: false }
    qa:        every_code_task
  enterprise:                    # regulated, multi-team, external audit
    phases:    [business, design, srs, traceability, tech_plan, dev_plan, build]
    human_gates: [srs_approval, foundational_decisions, dev_plan_approval, epic00_exit_review, feature_epic_breakdown, epic_to_dev_merge, dev_to_main_merge, db_schema_migration, new_dependency, secrets_or_env_change, auth_or_payment_code, delete_over_50_lines, release]
    review:    peer_plus_independent_qa_every_task
    git:       { tiers: [main, development, epic, task], require_pr: true }
    qa:        every_task

# BRD + a UI reference are ENTRY conditions, not phase outputs (v2 · ADR-0001 D-5).
prerequisites:
  required: [brd, ui_reference]  # /kickoff hard-blocks without both — no --no-ui
  ui_reference_forms: [figma, html_prototype, agent_generated_design, stitch_export, screenshots]

platforms:                      # fallback order for rate-limit handoff
  - name: claude-code
    adapter: harness/adapters/run-claude.sh
    freeze_threshold_pct: 80    # freeze + handoff at 80% of 5h window
    weekly_guard: true
  - name: codex
    adapter: harness/adapters/run-codex.sh
    freeze_threshold_pct: 80
  - name: opencode
    adapter: harness/adapters/run-opencode.sh
    freeze_threshold_pct: 80

model_tiers:                    # v2 · ADR-0001 D-6 — tiers are the portable unit.
                                # Task frontmatter + role cards carry `tier:`, NEVER a
                                # model name. Each tier maps to a model PER PLATFORM; no
                                # platform is the default. If the active platform has no
                                # mapping for a tier, the run STOPS and asks (no silent
                                # cross-vendor fallback). Adapters resolve their own row.
  deep:                         # decisions expensive to get wrong; security surfaces
    intent: "deepest reasoning available on the active platform"
    claude-code: opus
    codex:       gpt-5-codex-high   # set to your Codex high-reasoning model
    opencode:    null                # unset → stops and asks
    gemini-cli:  null
  build:                        # normal implementation against a written contract
    intent: "competent coding against a spec"
    claude-code: sonnet
    codex:       gpt-5-codex
    opencode:    null
    gemini-cli:  null
  cheap:                        # mechanical edits, renames, summaries
    intent: "reasoning depth buys nothing here"
    claude-code: haiku
    codex:       gpt-5-codex-mini
    opencode:    null
    gemini-cli:  null

budgets:
  per_task_warn_usd: 5
  per_epic_warn_usd: 60

paths:
  workspace_root: workspace/
  docs: workspace/docs/
  business_docs: workspace/docs/business/
  design_docs: workspace/docs/design/
  spec: workspace/spec/
  epics: workspace/epics/
  runs: workspace/runs/
  dashboard: workspace/dashboard/
  plan: workspace/plan/
  assets: workspace/assets/
  questions: workspace/open-questions.md
  handoffs: harness/handoffs/
  rates: harness/rates/cost-config.yaml
  templates: harness/templates/            # + harness/templates/epic/ for epic/task/tracker
  workspace: workspace/plan/       # phase 0-4 artifacts (see workspace/plan/README.md)
  state: workspace/state.yaml      # pipeline position — resume point for any platform
  lessons: harness/memory/lessons/
  decisions: harness/memory/decisions/

phase_order: [business, design, srs, traceability, tech_plan, dev_plan, build]
phase_dependencies:               # validator-enforced minimum executable path
  design:       [business]
  srs:          [business, design]
  traceability: [srs]
  tech_plan:    [traceability]
  dev_plan:     [srs, tech_plan]
  build:        [dev_plan]

pipeline:                          # phase → driver skills (slash commands on Claude Code)
  business: [kickoff, brd, prd, features, forecast]
  design: [design]
  srs: [srs-authoring]
  traceability: [trace]
  tech_plan: [tech-plan]
  dev_plan: [dev-plan, epic]
  build: [build, qa, checkpoint]
  anytime: [status, question, lesson]

scheduler:
  statuses: [todo, in-progress, review-requested, changes-requested, done, verified, blocked, frozen]
  lanes: [backend, frontend, cli, infra, docs, cross-cutting]
  pick_order: [unblocked, moscow, wsjf, critical_path]
  wip_limit_parallel_agents: 3   # 2–4 is the sane range

# ── guardrails: who may write where ─────────────────────────────────────────
# Path allowlists per role. The validator errors when a task's files: plan
# falls outside its owner_agent's scope. Overlap is allowed. Runtime tool
# restriction is deliberately NOT used (every role writes repo artifacts);
# enforcement = this declaration + validator + peer review + QA + git hooks.
write_scopes:
  shared:            # every role may write these
    - workspace/state.yaml
    - workspace/plan/02-traceability/
    - workspace/open-questions.md
    - harness/memory/lessons/
    - workspace/runs/
  product_code:      # developers' code surface — E00 genesis REPLACES this
    - src/
    - tests/
  analyst:     [workspace/docs/business/, workspace/plan/00-business/, workspace/assets/]
  designer:    [workspace/plan/01-design/, workspace/docs/design/, workspace/assets/design-imports/]
  architect:   [workspace/plan/03-technical/, harness/memory/decisions/]
  pm:          [workspace/spec/, workspace/epics/, workspace/plan/00-business/]
  team-lead:   [workspace/plan/04-dev/, workspace/epics/, workspace/spec/, harness/memory/decisions/]
  developer-backend:  [product_code, workspace/epics/]   # epics = own task file status/checklist only
  developer-frontend: [product_code, workspace/epics/]
  qa:          [workspace/epics/, product_code]          # product_code = TESTS only (card rule)
  devops:      [.github/, infra/, docker/, Makefile, product_code]
  orchestrator: [workspace/state.yaml, workspace/epics/, workspace/dashboard/, workspace/runs/]

# Who may change the HARNESS itself (harness/, AGENTS.md, CLAUDE.md, harness/templates/,
# harness.yaml): only via the lesson->rule promotion ladder (skills/retro) or
# skills/skill-authoring, with human approval. Product work never edits these.
harness_change_policy:
  protected: [harness/, AGENTS.md, CLAUDE.md, harness/templates/, harness.yaml, harness/templates/epic/]
  allowed_via: [skill-authoring, retro, lesson]
  requires: human_approval

human_gates:                     # actions that ALWAYS pause for a human
  - srs_approval                  # canonical build law before trace/planning
  - foundational_decisions       # stack/architecture/security ADR decisions
  - dev_plan_approval             # epic map + E00 before dispatch
  - epic00_exit_review           # domain model + ADRs + skeleton before ANY feature epic shards
  - feature_epic_breakdown       # approve the first wave the PM proposes
  - epic_to_dev_merge
  - dev_to_main_merge
  - db_schema_migration
  - new_dependency
  - secrets_or_env_change
  - auth_or_payment_code
  - delete_over_50_lines
