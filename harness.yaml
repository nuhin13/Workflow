# harness.yaml — project topology & policy ("org code")
# Read by the thin orchestrator scripts in agent/orchestrator/.
version: 1
project: "YourProject"           # set by /kickoff — keep in sync with memory/state.yaml
template_repo: null              # set by /harness-sync setup — where harness updates
                                 # are pulled from and universal lessons promoted to

platforms:                      # fallback order for rate-limit handoff
  - name: claude-code
    adapter: agent/adapters/run-claude.sh
    freeze_threshold_pct: 80    # freeze + handoff at 80% of 5h window
    weekly_guard: true
  - name: codex
    adapter: agent/adapters/run-codex.sh
    freeze_threshold_pct: 80
  - name: opencode
    adapter: agent/adapters/run-opencode.sh
    freeze_threshold_pct: 80

model_tiers:                    # routing hints (see skills/token-optimization)
  plan_review: opus             # PM / Team Lead / architecture / final review
  implement: sonnet             # default developer tier
  trivial: haiku                # renames, boilerplate, log msgs, summaries

budgets:
  per_task_warn_usd: 5
  per_epic_warn_usd: 60

paths:
  spec: spec/
  epics: epics/
  runs: runs/
  handoffs: agent/handoffs/
  rates: agent/rates/cost-config.yaml
  templates: templates/            # + epics/_templates/ for epic/task/tracker
  workspace: project/              # phase 0-4 artifacts (see project/README.md)
  state: memory/state.yaml         # pipeline position — resume point for any platform
  lessons: agent/memory/lessons/
  decisions: agent/memory/decisions/

pipeline:                          # phase → driver skills (slash commands on Claude Code)
  business: [kickoff, brd, prd, features, forecast]
  design: [design]
  traceability: [trace]
  tech_plan: [tech-plan]
  dev_plan: [dev-plan, epic]
  build_loop: [build, qa, checkpoint]
  anytime: [status, question, lesson]

scheduler:
  statuses: [todo, in-progress, review-requested, changes-requested, done, verified, blocked, frozen]
  lanes: [backend, frontend, cli, infra, docs, cross-cutting]
  pick_order: [unblocked, moscow, wsjf, critical_path]
  wip_limit_parallel_agents: 3   # 2–4 is the sane range

# ── guardrails: who may write where ─────────────────────────────────────────
# Path allowlists per role. The validator errors when a task's files: plan
# falls outside its owner_agent's scope. Overlap is allowed. Runtime tool
# restriction is deliberately NOT used (every role writes repo artifacts);
# enforcement = this declaration + validator + peer review + QA + git hooks.
write_scopes:
  shared:            # every role may write these
    - memory/state.yaml
    - project/02-traceability/
    - project/open-questions.md
    - agent/memory/lessons/
    - runs/
  product_code:      # developers' code surface — E00 genesis REPLACES this
    - src/
    - tests/
  analyst:     [docs/business/, project/00-business/, project/assets/]
  designer:    [project/01-design/, docs/design/, project/assets/design-imports/]
  architect:   [project/03-technical/, agent/memory/decisions/]
  pm:          [spec/, epics/, project/00-business/]
  team-lead:   [project/04-plan/, epics/, spec/, agent/memory/decisions/]
  developer-backend:  [product_code, epics/]   # epics/ = own task file status/checklist only
  developer-frontend: [product_code, epics/]
  qa:          [epics/, product_code]          # product_code = TESTS only (card rule)
  devops:      [.github/, infra/, docker/, Makefile, product_code]
  orchestrator: [memory/, epics/, dashboard/, runs/]

# Who may change the HARNESS itself (agent/, AGENTS.md, CLAUDE.md, templates/,
# harness.yaml): only via the lesson->rule promotion ladder (skills/retro) or
# skills/skill-authoring, with human approval. Product work never edits these.
harness_change_policy:
  protected: [agent/, AGENTS.md, CLAUDE.md, templates/, harness.yaml, epics/_templates/]
  allowed_via: [skill-authoring, retro, lesson]
  requires: human_approval

human_gates:                     # actions that ALWAYS pause for a human
  - epic00_exit_review           # domain model + ADRs + skeleton before ANY feature epic shards
  - feature_epic_breakdown       # approve the first wave the PM proposes
  - epic_to_dev_merge
  - dev_to_main_merge
  - db_schema_migration
  - new_dependency
  - secrets_or_env_change
  - auth_or_payment_code
  - delete_over_50_lines
